version: "3.9"

# ── Service Architecture ─────────────────────────────────────────────────────
#
# scanner (scheduled job):
#   Runs briefly every hour during NSE market hours (9:15–15:30 IST /
#   03:45–10:00 UTC), checks for signals and stop-loss breaches, then
#   idles until the next scheduled run. APScheduler handles timing internally.
#   Can be restart: unless-stopped since no persistent connections needed.
#
# bot (persistent service):
#   MUST remain running at all times. python-telegram-bot uses a long-poll
#   loop waiting for user button-press callbacks. If this process exits,
#   all pending [Accept]/[Reject] callbacks are lost. This is why it cannot
#   be a cron job. Use restart: always.
#
# dashboard (web server):
#   Streamlit server — always running on port 8502. Reads from the shared
#   SQLite DB (no separate data pipeline).
#
# All three services share the same ./data volume so they read/write the
# same SQLite database (trading.db) and cache (nifty500.csv).
# ─────────────────────────────────────────────────────────────────────────────

services:
  scanner:
    build:
      context: .
      dockerfile: docker/Dockerfile.scanner
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: always   # always restart — must stay alive for callbacks

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    env_file: .env
    volumes:
      - ./data:/app/data
    ports:
      - "${DASHBOARD_PORT:-8502}:8502"
    restart: unless-stopped
